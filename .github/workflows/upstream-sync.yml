name: Upstream Sync

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  UPSTREAM_REPO: exa-labs/exa-mcp-server
  UPSTREAM_BRANCH: main
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BASE_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Inspect upstream state
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --no-tags origin "${BASE_BRANCH}"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          BASE_REF="origin/${BASE_BRANCH}"
          UPSTREAM_REF="upstream/${UPSTREAM_BRANCH}"
          UPSTREAM_SHA="$(git rev-parse "${UPSTREAM_REF}")"
          MERGE_BASE="$(git merge-base "${BASE_REF}" "${UPSTREAM_REF}")"
          UPSTREAM_SHORT="$(git rev-parse --short "${UPSTREAM_REF}")"
          SYNC_BRANCH="upstream-sync/${UPSTREAM_SHORT}"
          HEAD_REF="${GITHUB_REPOSITORY_OWNER}:${SYNC_BRANCH}"

          echo "upstream_sha=${UPSTREAM_SHA}" >> "${GITHUB_OUTPUT}"
          echo "merge_base=${MERGE_BASE}" >> "${GITHUB_OUTPUT}"
          echo "upstream_short=${UPSTREAM_SHORT}" >> "${GITHUB_OUTPUT}"
          echo "sync_branch=${SYNC_BRANCH}" >> "${GITHUB_OUTPUT}"

          if [ "${UPSTREAM_SHA}" = "${MERGE_BASE}" ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "has_existing_pr=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          COMMIT_COUNT="$(git rev-list --count "${MERGE_BASE}..${UPSTREAM_SHA}")"
          EXISTING_PR_URL="$(gh pr list --repo "${REPO}" --state open --head "${HEAD_REF}" --json url --jq '.[0].url // ""')"

          git diff --stat "${MERGE_BASE}..${UPSTREAM_SHA}" > /tmp/upstream-diff-stat.txt
          git log --oneline "${MERGE_BASE}..${UPSTREAM_SHA}" > /tmp/upstream-commit-log.txt
          git diff --name-only "${MERGE_BASE}..${UPSTREAM_SHA}" > /tmp/upstream-changed-files.txt

          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "commit_count=${COMMIT_COUNT}" >> "${GITHUB_OUTPUT}"

          if [ -n "${EXISTING_PR_URL}" ]; then
            echo "has_existing_pr=true" >> "${GITHUB_OUTPUT}"
            echo "existing_pr_url=${EXISTING_PR_URL}" >> "${GITHUB_OUTPUT}"
          else
            echo "has_existing_pr=false" >> "${GITHUB_OUTPUT}"
            echo "existing_pr_url=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node.js
        if: steps.prepare.outputs.has_changes == 'true' && steps.prepare.outputs.has_existing_pr != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Prepare sync branch
        if: steps.prepare.outputs.has_changes == 'true' && steps.prepare.outputs.has_existing_pr != 'true'
        id: merge
        run: |
          set -euo pipefail

          BRANCH="${{ steps.prepare.outputs.sync_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "${BRANCH}" "origin/${BASE_BRANCH}"

          if git merge "upstream/${UPSTREAM_BRANCH}" --no-ff --no-edit; then
            echo "merge_state=clean" >> "${GITHUB_OUTPUT}"
          else
            echo "merge_state=conflicted" >> "${GITHUB_OUTPUT}"
          fi

          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Claude review and conflict resolution
        if: steps.prepare.outputs.has_changes == 'true' && steps.prepare.outputs.has_existing_pr != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          prompt: |
            You are maintaining the fork `${{ github.repository }}` of `${{ env.UPSTREAM_REPO }}`.

            The checked-out branch is `${{ steps.merge.outputs.branch }}`.
            It was created from `origin/${{ env.BASE_BRANCH }}` and then merged with `upstream/${{ env.UPSTREAM_BRANCH }}`.
            Current merge state: `${{ steps.merge.outputs.merge_state }}`.

            Tasks:
            1. Review the upstream changes for security, supply-chain, and stability concerns.
            2. If the merge state is `conflicted`, resolve every git conflict and finish the merge with a commit.
            3. Preserve fork-specific automation and workflow behavior unless upstream clearly supersedes it.
            4. If you make follow-up code changes beyond the merge resolution, commit them.
            5. Write a concise markdown report to `/tmp/upstream-review.md` with these sections:
               - `## Summary`
               - `## Risks`
               - `## Testing`
               - `## Notes`

            Constraints:
            - Do not open a pull request.
            - Do not push any branch.
            - Leave the git worktree clean when you are done.

            Context:
            - Upstream SHA: `${{ steps.prepare.outputs.upstream_sha }}`
            - Upstream commits: `${{ steps.prepare.outputs.commit_count }}`
            - Commit log: `/tmp/upstream-commit-log.txt`
            - Changed files: `/tmp/upstream-changed-files.txt`
            - Diff stat: `/tmp/upstream-diff-stat.txt`

            If validation is useful, prefer the lightest relevant commands for this TypeScript repository.
          claude_args: |
            --max-turns 20
            --model claude-sonnet-4-5-20250929
            --allowedTools "Read,Write,Edit,Bash(git:*),Bash(npm:*),Bash(npx tsc:*)"

      - name: Finalize sync branch
        if: steps.prepare.outputs.has_changes == 'true' && steps.prepare.outputs.has_existing_pr != 'true'
        id: finalize
        run: |
          set -euo pipefail

          BRANCH="${{ steps.merge.outputs.branch }}"

          if git ls-files -u | grep -q .; then
            echo "Unresolved merge conflicts remain on ${BRANCH}" >&2
            exit 1
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git status --short
            echo "The worktree is dirty. Commit any remaining changes before finishing." >&2
            exit 1
          fi

          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/${BASE_BRANCH}")" ]; then
            echo "Sync branch does not contain upstream changes." >&2
            exit 1
          fi

          git push --force-with-lease origin "HEAD:${BRANCH}"
          echo "branch=${BRANCH}" >> "${GITHUB_OUTPUT}"

      - name: Create or update sync PR
        if: steps.prepare.outputs.has_changes == 'true' && steps.prepare.outputs.has_existing_pr != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          BRANCH="${{ steps.finalize.outputs.branch }}"
          TITLE="chore: sync upstream ${{ env.UPSTREAM_REPO }}@${{ steps.prepare.outputs.upstream_short }}"
          BODY_FILE="$(mktemp)"

          {
            echo "## Upstream Sync"
            echo
            echo "- Upstream: \`${{ env.UPSTREAM_REPO }}@${{ steps.prepare.outputs.upstream_sha }}\`"
            echo "- Commits: ${{ steps.prepare.outputs.commit_count }}"
            echo "- Branch: \`${BRANCH}\`"
            echo
            if [ -f /tmp/upstream-review.md ]; then
              cat /tmp/upstream-review.md
            else
              echo "## Summary"
              echo
              echo "Automated upstream sync completed without an agent-authored report."
            fi
            echo
            echo "<details><summary>Commit log</summary>"
            echo
            echo '```text'
            cat /tmp/upstream-commit-log.txt
            echo '```'
            echo
            echo "</details>"
            echo
            echo "<details><summary>Diff stat</summary>"
            echo
            echo '```text'
            cat /tmp/upstream-diff-stat.txt
            echo '```'
            echo
            echo "</details>"
          } > "${BODY_FILE}"

          PR_URL="$(gh pr list --repo "${REPO}" --state open --head "${GITHUB_REPOSITORY_OWNER}:${BRANCH}" --json url --jq '.[0].url // ""')"

          if [ -n "${PR_URL}" ]; then
            gh pr edit "${PR_URL}" --repo "${REPO}" --title "${TITLE}" --body-file "${BODY_FILE}"
          else
            PR_URL="$(gh pr create --repo "${REPO}" --base "${BASE_BRANCH}" --head "${BRANCH}" --title "${TITLE}" --body-file "${BODY_FILE}")"
          fi

          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Notify -- no changes
        if: steps.prepare.outputs.has_changes == 'false'
        uses: kabilan108/actions/discord-notify@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          level: info
          title: No upstream changes
          description: ${{ env.UPSTREAM_REPO }} is already in sync.

      - name: Notify -- sync PR already open
        if: steps.prepare.outputs.has_existing_pr == 'true'
        uses: kabilan108/actions/discord-notify@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          level: info
          title: Upstream sync PR already open
          description: |
            Existing PR: ${{ steps.prepare.outputs.existing_pr_url }}
            Branch: ${{ steps.prepare.outputs.sync_branch }}

      - name: Notify -- PR ready
        if: steps.pr.outputs.pr_url != ''
        uses: kabilan108/actions/discord-notify@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          level: success
          title: Upstream sync PR ready
          description: |
            ${{ steps.prepare.outputs.commit_count }} upstream commits prepared on ${{ steps.finalize.outputs.branch }}.
            PR: ${{ steps.pr.outputs.pr_url }}

      - name: Notify -- workflow failure
        if: failure()
        uses: kabilan108/actions/discord-notify@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          level: error
          title: Upstream sync workflow failed
          description: Check the workflow run for details.
